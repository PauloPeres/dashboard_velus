name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: velus
          POSTGRES_PASSWORD: velus
          POSTGRES_DB: velus_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: test
      DATABASE_URL: postgres://velus:velus@localhost:5432/velus_dashboard_test
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      FERNET_KEY: change-me-generate-with-fernet

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check apps/ config/ tests/

      - name: Run tests
        run: uv run pytest
