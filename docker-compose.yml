# =============================================================================
# Velus Dashboard — Docker Compose
# =============================================================================
# Default (`docker compose up`) sobe TUDO: postgres + redis + web + worker + beat.
#
# Pra rodar SÓ a infra (Postgres + Redis) e iterar Django/Celery no host:
#     docker compose up -d postgres redis
# Daí no host:
#     uv run python manage.py runserver
#     uv run celery -A config worker -Q tenant_velus,celery --loglevel=info
#     uv run celery -A config beat --loglevel=info
#
# Build vs pull:
#   `docker compose build` força rebuild da imagem (após mudanças no Dockerfile).
#   `docker compose up --build` build + up num passo.
# =============================================================================

x-app-defaults: &app_defaults
  build:
    context: .
    dockerfile: Dockerfile
    args:
      INSTALL_DEV: "true"
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.development
    DATABASE_URL: postgres://velus:velus@postgres:5432/velus_dashboard
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web"
    PYTHONUNBUFFERED: "1"
  volumes:
    - .:/app
    - venv_cache:/opt/venv
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: velus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velus_dashboard
      POSTGRES_USER: velus
      POSTGRES_PASSWORD: velus
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velus -d velus_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: velus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------------------------------
  # Web — Django runserver (dev) ou gunicorn (prod via override)
  # -------------------------------------------------------------------------
  web:
    <<: *app_defaults
    container_name: velus_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  # -------------------------------------------------------------------------
  # Celery worker — processa filas tenant_velus + default
  # -------------------------------------------------------------------------
  worker:
    <<: *app_defaults
    container_name: velus_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info -Q tenant_velus,celery -E

  # -------------------------------------------------------------------------
  # Celery Beat — scheduler (incremental sync a cada 3h)
  # -------------------------------------------------------------------------
  beat:
    <<: *app_defaults
    container_name: velus_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info

volumes:
  postgres_data:
    name: velus_postgres_data
  redis_data:
    name: velus_redis_data
  venv_cache:
    name: velus_venv_cache
