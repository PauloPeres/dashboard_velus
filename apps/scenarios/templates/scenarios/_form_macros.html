{% load humanize %}
{# Form genérico — Tailwind styling #}
<form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
        <div class="mt-1">
            {{ field }}
        </div>
        {% if field.errors %}
            <p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">
            Calcular
        </button>
        {% if result %}
        <button type="submit" name="save_scenario" value="1" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm">
            Salvar cenário
        </button>
        <input type="text" name="scenario_name" placeholder="Nome do cenário" class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm">
        {% endif %}
    </div>
</form>

<style>
    form input[type="text"], form input[type="number"] {
        width: 100%; padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: .375rem; font-size: .875rem;
    }
</style>
